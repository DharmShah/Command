<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Next.js boilerplate with App Router commands, folder structure, and deployment-ready startup workflow."
    />
    <meta
      name="keywords"
      content="nextjs boilerplate, app router setup, next.js starter"
    />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="Next.js Boilerplate" />
    <meta
      property="og:description"
      content="Next.js starter commands and structure for fast setup and deployment."
    />
    <meta name="twitter:card" content="summary" />
    <title>Next.js Boilerplate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./copy-code.js" defer></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
      <a href="../index.html" class="text-sm font-semibold text-emerald-700"
        >Back to Home</a
      >
      <h1 class="mt-3 text-3xl font-black">Next.js</h1>
      <section class="mt-6 grid gap-4 md:grid-cols-2">
        <article class="rounded-xl bg-white p-4 shadow">
          <div class="mb-2 flex items-center justify-between">
            <h2 class="text-lg font-semibold">Commands</h2>
            <button
              data-copy-target="nx-cmd"
              class="inline-flex items-center gap-1 rounded-md border border-slate-300 bg-slate-100 px-2 py-1 text-slate-700"
            ></button>
          </div>
          <pre
            id="nx-cmd"
            class="overflow-x-auto rounded bg-slate-950 p-3 text-xs text-emerald-100"
          >
npx create-next-app@latest nextjs_app
cd nextjs_app
npm run dev</pre
          >
        </article>
        <article class="rounded-xl bg-white p-4 shadow">
          <div class="mb-2 flex items-center justify-between">
            <h2 class="text-lg font-semibold">Folder Structure</h2>
            <button
              data-copy-target="nx-structure"
              class="inline-flex items-center gap-1 rounded-md border border-slate-300 bg-slate-100 px-2 py-1 text-slate-700"
            ></button>
          </div>
          <pre
            id="nx-structure"
            class="overflow-x-auto rounded bg-slate-950 p-3 text-xs text-emerald-100"
          >
nextjs_app/
  app/
    page.tsx
    layout.tsx
  public/
  package.json
  .env.local.example</pre
          >
        </article>
      </section>
    </main>
  </body>
</html>
